name: Build APK and Flash package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  flash-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: zip -r masjid-flash-android.zip index.html app.js styles.css manifest.json sw.js FLASH_ANDROID.md data media
      - uses: actions/upload-artifact@v4
        with:
          name: masjid-flash-android
          path: masjid-flash-android.zip

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Copy web app and sync to Android
        run: npm run cap:sync

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: masjid-screen-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
