name: Build APK and Flash package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  flash-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: zip -r masjid-flash-android.zip index.html app.js styles.css manifest.json sw.js FLASH_ANDROID.md data media
      - uses: actions/upload-artifact@v4
        with:
          name: masjid-flash-android
          path: masjid-flash-android.zip

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Copy web app and sync to Android
        run: npm run cap:sync

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Set SDK path for Gradle
        run: |
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

      - name: Create release keystore
        run: |
          mkdir -p android/app
          keytool -genkey -v -keystore android/app/release.keystore -alias masjid -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android -dname "CN=Masjid, OU=App, O=Masjid, L=City, S=State, C=US"

      - name: Build release APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease --no-daemon \
            -PRELEASE_STORE_FILE=app/release.keystore \
            -PRELEASE_STORE_PASSWORD=android \
            -PRELEASE_KEY_ALIAS=masjid \
            -PRELEASE_KEY_PASSWORD=android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: masjid-screen-apk
          path: android/app/build/outputs/apk/release/app-release.apk
