name: Build APK and Flash package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  flash-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: zip -r masjid-flash-android.zip index.html app.js styles.css manifest.json sw.js FLASH_ANDROID.md data media
      - uses: actions/upload-artifact@v4
        with:
          name: masjid-flash-android
          path: masjid-flash-android.zip

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Copy web app and sync to Android
        run: npm run cap:sync

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Set SDK path for Gradle
        run: |
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

      - name: Create keystores
        run: |
          mkdir -p android/app
          # Create consistent debug keystore
          keytool -genkey -v -keystore android/app/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
          # Create release keystore
          keytool -genkey -v -keystore android/app/release.keystore -alias masjid -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android -dname "CN=Masjid, OU=App, O=Masjid, L=City, S=State, C=US"

      - name: Build debug and release APKs
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug assembleRelease --no-daemon --stacktrace \
            -Pandroid.injected.testOnly=false \
            -PRELEASE_STORE_FILE=release.keystore \
            -PRELEASE_STORE_PASSWORD=android \
            -PRELEASE_KEY_ALIAS=masjid \
            -PRELEASE_KEY_PASSWORD=android

      - name: Verify APK signatures
        run: |
          echo "=== Verifying Debug APK ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose android/app/build/outputs/apk/debug/app-debug.apk || true
          echo "=== Verifying Release APK ==="
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose android/app/build/outputs/apk/release/app-release.apk

      - name: Show APK info (to confirm APK is valid)
        run: |
          echo "=== Debug APK info ==="
          $ANDROID_HOME/build-tools/34.0.0/aapt dump badging android/app/build/outputs/apk/debug/app-debug.apk | head -10
          echo ""
          echo "=== Release APK info ==="
          $ANDROID_HOME/build-tools/34.0.0/aapt dump badging android/app/build/outputs/apk/release/app-release.apk | head -10
          echo ""
          echo "=== APK file sizes ==="
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk
          ls -lh android/app/build/outputs/apk/release/app-release.apk

      - name: Package both APKs
        run: |
          cd android/app/build/outputs/apk
          zip -j masjid-screen-apks.zip debug/app-debug.apk release/app-release.apk

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: masjid-screen-apk
          path: android/app/build/outputs/apk/masjid-screen-apks.zip
