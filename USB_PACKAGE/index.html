<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>شاشة المسجد</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
:root{--panel:rgba(88,52,120,.75);--panel-dark:rgba(45,30,65,.85);--text:#fff;--muted:rgba(255,255,255,.85);--radius:20px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:"Tajawal","Segoe UI",Arial,sans-serif;background:#0a0a12;color:#fff;overflow:hidden}
body::before{content:"";position:fixed;inset:0;background:linear-gradient(165deg,rgba(0,0,0,.3)0%,rgba(20,10,40,.25)40%,rgba(0,0,0,.4)100%);z-index:0}
.prayer-time-screen{position:fixed;inset:0;z-index:100;background:#000;display:flex;align-items:center;justify-content:center}
.prayer-time-screen.hidden{display:none}
.prayer-time-text{font-size:clamp(3rem,8vw,6rem);font-weight:900;color:#fff;text-shadow:0 4px 12px rgba(0,0,0,.8)}
.screen{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;justify-content:center;padding:clamp(12px,2vw,20px);background:linear-gradient(135deg,rgba(45,25,75,.9),rgba(25,15,45,.85));box-shadow:0 4px 20px rgba(0,0,0,.3)}
.mosque-name{font-size:clamp(1.5rem,4vw,2.5rem);font-weight:800;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.5)}
.hero{flex:1;display:flex;align-items:center;justify-content:center;padding:clamp(16px,3vw,32px)}
.hero-box{background:linear-gradient(145deg,rgba(88,52,120,.88),rgba(55,35,85,.9),rgba(45,28,70,.92));border-radius:var(--radius);padding:clamp(24px,4vw,48px) clamp(32px,5vw,64px);text-align:center;min-width:280px;box-shadow:0 12px 40px rgba(0,0,0,.35)}
.hero-time{font-size:clamp(2.5rem,7vw,5rem);font-weight:900;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.5)}
.hero-date{font-size:clamp(1rem,2.5vw,1.5rem);color:var(--muted);margin-top:clamp(8px,1.5vw,14px);text-shadow:0 1px 2px rgba(0,0,0,.4)}
.hero-next{font-size:clamp(0.9rem,2vw,1.25rem);color:var(--muted);margin-top:clamp(10px,1.5vw,16px);text-shadow:0 1px 2px rgba(0,0,0,.4)}
.hero-box.hidden{display:none}
.adhkar-box{display:none;background:linear-gradient(145deg,rgba(70,45,110,.9),rgba(50,30,80,.92));border-radius:var(--radius);padding:clamp(32px,5vw,56px);text-align:center;min-width:280px;max-width:90vw;box-shadow:0 12px 40px rgba(0,0,0,.35)}
.adhkar-box.visible{display:flex;flex-direction:column;align-items:center;justify-content:center}
.adhkar-title{font-size:clamp(1.2rem,2.5vw,1.6rem);font-weight:800;color:var(--muted);margin-bottom:clamp(14px,2vw,24px)}
.adhkar-quote{font-size:clamp(1.4rem,3.5vw,2.2rem);font-weight:700;color:#fff;line-height:1.7;max-width:85vw;margin-bottom:clamp(10px,1.5vw,18px);text-shadow:0 2px 4px rgba(0,0,0,.5)}
.adhkar-source{font-size:clamp(0.9rem,2vw,1.2rem);font-weight:600;color:var(--muted)}
.prayer-cards{display:flex;justify-content:center;gap:clamp(8px,1.5vw,16px);padding:clamp(12px,2vw,24px);flex-wrap:wrap}
.prayer-card{background:linear-gradient(160deg,rgba(40,25,60,.9),rgba(30,18,50,.92));border-radius:clamp(10px,1.5vw,16px);padding:clamp(10px,1.5vw,18px) clamp(14px,2vw,24px);min-width:clamp(90px,12vw,140px);text-align:center;box-shadow:0 6px 20px rgba(0,0,0,.3)}
.prayer-card.next{background:linear-gradient(160deg,rgba(110,70,160,.95),rgba(85,50,130,.95));box-shadow:0 0 0 2px rgba(255,255,255,.25),0 8px 24px rgba(0,0,0,.35)}
.prayer-card .name{font-size:clamp(0.8rem,1.5vw,1.1rem);font-weight:700;color:var(--muted);margin-bottom:clamp(4px,0.8vw,10px);text-shadow:0 1px 2px rgba(0,0,0,.4)}
.prayer-card .time{font-size:clamp(1.1rem,2.5vw,1.7rem);font-weight:900;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.5)}
.prayer-card .time-ampm{font-size:clamp(0.65rem,1.2vw,0.9rem);font-weight:600;color:var(--muted);margin-top:2px}
</style>
</head>
<body>
<div id="prayerTimeScreen" class="prayer-time-screen hidden"><span class="prayer-time-text">وقت الصلاة</span></div>
<div class="screen">
<header class="topbar"><div class="mosque-name" id="mosqueName">مسجد خليل عبد الرحمن</div></header>
<main class="hero">
<div class="hero-box" id="heroBox">
<div class="hero-time" id="clock">--:--:--</div>
<div class="hero-date" id="todayDate">—</div>
<div class="hero-next" id="heroNext">—</div>
</div>
<div class="adhkar-box" id="adhkarBox">
<div class="adhkar-title">الأذكار</div>
<div class="adhkar-quote" id="adhkarQuoteText">—</div>
<div class="adhkar-source" id="adhkarQuoteSource">—</div>
</div>
</main>
<section class="prayer-cards" id="prayerCards"></section>
</div>

// ===================== APP CONFIGURATION =====================
const IQAMAH = {fajr:25,dhuhr:15,asr:15,maghrib:10,isha:10};
const PRAYER_WAIT_MIN = 8;
const ADHKAR_SLIDE_SEC = 6;
const PRAYERS = ["fajr","dhuhr","asr","maghrib","isha"];
const PRAYER_NAMES = {fajr:"الفجر",sunrise:"الشروق",dhuhr:"الظهر",asr:"العصر",maghrib:"المغرب",isha:"العشاء"};

let adhkarIdx=0, lastAdhkarTime=null, adhkarDone=false;

// ===================== HELPER FUNCTIONS =====================
function pad2(n){return String(n).padStart(2,"0")}
function hhmmToDate(hhmm,base=new Date()){
  const [h,m]=hhmm.split(":").map(Number);
  const d=new Date(base);d.setHours(h,m,0,0);return d;
}
function formatTime12(d){
  const h=d.getHours(),m=d.getMinutes(),s=d.getSeconds();
  const h12=h===0?12:(h>12?h-12:h);
  return `${h12}:${pad2(m)}:${pad2(s)} ${h>=12?"م":"ص"}`;
}
function formatDate(d){
  try{return new Intl.DateTimeFormat("ar-EG",{weekday:"long",year:"numeric",month:"long",day:"2-digit"}).format(d)}
  catch{return d.toDateString()}
}

function getTodayRow(){
  const now=new Date();
  const m=now.getMonth()+1,day=now.getDate();
  return TIMETABLE_DATA.find(r=>r.m===m&&r.d===day)||TIMETABLE_DATA[0];
}

function getState(row,now){
  for(const key of PRAYERS){
    const adhan=hhmmToDate(row[key],now);
    const iqamah=new Date(adhan.getTime()+IQAMAH[key]*60000);
    const waitEnd=new Date(iqamah.getTime()+PRAYER_WAIT_MIN*60000);
    if(now<adhan) return {mode:"next",prayer:key,at:adhan};
    if(now<iqamah) return {mode:"iqamah",prayer:key,at:iqamah};
    if(now<waitEnd) return {mode:"wait"};
  }
  return {mode:"adhkar"};
}

function renderCards(row,nextKey){
  const container=document.getElementById("prayerCards");
  container.innerHTML="";
  const items=[
    {k:"fajr",n:"الفجر",v:row.fajr},
    {k:"sunrise",n:"الشروق",v:row.sunrise},
    {k:"dhuhr",n:"الظهر",v:row.dhuhr},
    {k:"asr",n:"العصر",v:row.asr},
    {k:"maghrib",n:"المغرب",v:row.maghrib},
    {k:"isha",n:"العشاء",v:row.isha}
  ];
  items.forEach(it=>{
    const card=document.createElement("div");
    card.className="prayer-card"+(it.k===nextKey?" next":"");
    const [h,m]=it.v.split(":").map(Number);
    const h12=h===0?12:(h>12?h-12:h);
    const ampm=h>=12?"م":"ص";
    card.innerHTML=`<div class="name">${it.n}</div><div class="time">${h12}:${pad2(m)}</div><div class="time-ampm">${ampm}</div>`;
    container.appendChild(card);
  });
}

// ===================== MAIN TICK FUNCTION =====================
function tick(){
  const now=new Date();
  document.getElementById("clock").textContent=formatTime12(now);
  document.getElementById("todayDate").textContent=formatDate(now);
  
  const row=getTodayRow();
  const state=getState(row,now);
  
  const heroBox=document.getElementById("heroBox");
  const adhkarBox=document.getElementById("adhkarBox");
  const prayerScreen=document.getElementById("prayerTimeScreen");
  const heroNext=document.getElementById("heroNext");
  
  if(state.mode!=="adhkar"){adhkarIdx=0;lastAdhkarTime=null;adhkarDone=false;}
  
  if(state.mode==="wait"){
    heroBox.classList.add("hidden");
    adhkarBox.classList.remove("visible");
    prayerScreen.classList.remove("hidden");
  }else if(state.mode==="adhkar"){
    prayerScreen.classList.add("hidden");
    if(adhkarDone){
      heroBox.classList.remove("hidden");
      adhkarBox.classList.remove("visible");
      heroNext.textContent="—";
    }else{
      heroBox.classList.add("hidden");
      adhkarBox.classList.add("visible");
      if(ADHKAR_DATA.length){
        if(!lastAdhkarTime)lastAdhkarTime=now;
        if((now-lastAdhkarTime)/1000>=ADHKAR_SLIDE_SEC){
          adhkarIdx++;lastAdhkarTime=now;
          if(adhkarIdx>=ADHKAR_DATA.length){adhkarIdx=ADHKAR_DATA.length-1;adhkarDone=true;}
        }
        document.getElementById("adhkarQuoteText").textContent=ADHKAR_DATA[adhkarIdx].text;
        document.getElementById("adhkarQuoteSource").textContent=ADHKAR_DATA[adhkarIdx].source;
      }else{adhkarDone=true;}
    }
  }else{
    heroBox.classList.remove("hidden");
    adhkarBox.classList.remove("visible");
    prayerScreen.classList.add("hidden");
    const diff=state.at-now;
    const total=Math.max(0,Math.floor(diff/1000));
    if(state.mode==="next"){
      const h=Math.floor(total/3600),m=Math.floor((total%3600)/60);
      heroNext.textContent=`${PRAYER_NAMES[state.prayer]} بعد ${pad2(h)}:${pad2(m)}`;
    }else{
      const m=Math.floor(total/60),s=total%60;
      heroNext.textContent=`صلاة ${PRAYER_NAMES[state.prayer]} تبدأ بعد ${pad2(m)}:${pad2(s)}`;
    }
  }
  
  const nextPrayer=PRAYERS.find(k=>hhmmToDate(row[k],now)>now)||"fajr";
  renderCards(row,nextPrayer);
}

// ===================== START APP =====================
tick();
setInterval(tick,1000);
</script>

</html>
