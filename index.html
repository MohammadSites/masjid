<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>شاشة المسجد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Fallback critical styles for older browsers/TV -->
  <style>
    body { background-color: #0a0a12; color: #fff; font-family: "Tajawal", Arial, sans-serif; }
    .topbar { background: rgba(45, 25, 75, 0.9); padding: 16px; text-align: center; }
    .mosque-name { color: #fff !important; font-size: 28px; font-weight: 800; }
    .hero { display: flex; align-items: center; justify-content: center; flex: 1; padding: 24px; }
    .hero-box { background: rgba(88, 52, 120, 0.85); padding: 40px; border-radius: 20px; text-align: center; }
    .hero-time { color: #fff !important; font-size: 48px; font-weight: 900; }
    .hero-date, .hero-next { color: rgba(255,255,255,0.85) !important; font-size: 18px; margin-top: 10px; }
    .prayer-cards { display: flex; justify-content: center; gap: 12px; padding: 20px; flex-wrap: wrap; }
    .prayer-card { background: rgba(45, 30, 65, 0.9); padding: 16px 20px; border-radius: 14px; text-align: center; min-width: 100px; }
    .prayer-card .name { color: rgba(255,255,255,0.85) !important; font-size: 14px; margin-bottom: 6px; }
    .prayer-card .time { color: #fff !important; font-size: 22px; font-weight: 900; }
    .prayer-card .time-ampm { color: rgba(255,255,255,0.7) !important; font-size: 12px; }
    .prayer-card.next { background: rgba(110, 70, 160, 0.95); }
  </style>
</head>
<body>
  <div id="prayerTimeScreen" class="prayer-time-screen hidden">
    <span class="prayer-time-text">وقت الصلاة</span>
  </div>
  <div class="screen">
    <header class="topbar">
      <div class="topbar-center">
        <div class="mosque-name" id="mosqueName">مسجد خليل عبد الرحمن</div>
      </div>
    </header>

    <main class="hero">
      <div class="hero-box" id="heroBox">
        <div class="hero-time" id="clock">--:--:--</div>
        <div class="hero-date" id="todayDate">—</div>
        <div class="hero-next" id="heroNext">—</div>
      </div>
      <div class="adhkar-box" id="adhkarBox">
        <div class="adhkar-title">الأذكار</div>
        <div class="adhkar-quote" id="adhkarQuoteText">—</div>
        <div class="adhkar-source" id="adhkarQuoteSource">—</div>
      </div>
    </main>

    <section class="prayer-cards" id="prayerCards">
      <!-- Fallback cards shown until JS loads -->
      <div class="prayer-card"><div class="name">الشروق</div><div class="time">--:--</div><div class="time-ampm"></div></div>
      <div class="prayer-card"><div class="name">الفجر</div><div class="time">--:--</div><div class="time-ampm"></div></div>
      <div class="prayer-card"><div class="name">الظهر</div><div class="time">--:--</div><div class="time-ampm"></div></div>
      <div class="prayer-card"><div class="name">العصر</div><div class="time">--:--</div><div class="time-ampm"></div></div>
      <div class="prayer-card"><div class="name">المغرب</div><div class="time">--:--</div><div class="time-ampm"></div></div>
      <div class="prayer-card"><div class="name">العشاء</div><div class="time">--:--</div><div class="time-ampm"></div></div>
    </section>

  </div>

  <div class="admin-hint" id="adminHint">Shift + A للإدارة</div>

  <dialog id="adminDialog">
    <form method="dialog" class="admin">
      <h2>لوحة الإدارة</h2>
      <label>اسم المسجد <input id="adminMosqueName" /></label>
      <label>اللغة
        <select id="adminLang">
          <option value="ar">العربية</option>
          <option value="en">English</option>
          <option value="he">עברית</option>
        </select>
      </label>
      <label>مدة عرض كل شريحة (ثواني) <input id="adminSlideSec" type="number" min="3" max="120" /></label>
      <label>رسائل الشريط السفلي (سطر لكل رسالة) <textarea id="adminTicker" rows="6"></textarea></label>
      <div class="row">
        <div class="box">
          <div class="box-title">استيراد timetable.csv</div>
          <input type="file" id="importTimetable" accept=".csv" />
        </div>
        <div class="box">
          <div class="box-title">استيراد config.json</div>
          <input type="file" id="importConfig" accept=".json" />
        </div>
      </div>
      <div class="actions">
        <button value="cancel">إغلاق</button>
        <button id="exportBtn" type="button">تصدير نسخة احتياطية</button>
        <button id="saveBtn" value="default">حفظ</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
